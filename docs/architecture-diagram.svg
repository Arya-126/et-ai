<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .lbl{fill:#e2e8f0;font-size:15px}
      .sub{fill:#94a3b8;font-size:12px}
      .h{fill:#ffffff;font-size:17px;font-weight:700}
      .tag{fill:#0b1220;font-size:12px;font-weight:700}
    </style>
  </defs>

  <rect width="1200" height="760" fill="#0b1220"/>
  <text x="40" y="46" fill="#ffffff" font-size="26" font-weight="700">Fraud Network Intelligence + Citizen Fraud Shield</text>
  <text x="40" y="72" class="sub" font-size="14">A closed loop: every citizen scam report is both instant protection and a new data point in a live fraud-network graph.</text>

  <!-- Citizen side -->
  <rect x="40" y="110" width="360" height="120" rx="14" fill="#10233f" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="78" cy="150" r="16" fill="#22d3ee"/><text x="78" y="156" text-anchor="middle" class="tag">1</text>
  <text x="108" y="146" class="h">Citizen Fraud Shield</text>
  <text x="108" y="170" class="sub">WhatsApp-style chat · paste call / SMS / message</text>
  <text x="108" y="192" class="lbl">Instant verdict · red flags · "Report to 1930"</text>
  <text x="108" y="214" class="sub">React + Tailwind</text>

  <!-- LE side -->
  <rect x="800" y="110" width="360" height="120" rx="14" fill="#2a1620" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="838" cy="150" r="16" fill="#ef4444"/><text x="838" y="156" text-anchor="middle" class="tag">4</text>
  <text x="868" y="146" class="h">Command Dashboard</text>
  <text x="868" y="170" class="sub">force-directed ring graph · rings light up</text>
  <text x="868" y="192" class="lbl">Detect Rings · Kingpin · Intelligence Package</text>
  <text x="868" y="214" class="sub">React + react-force-graph</text>

  <!-- Pipeline -->
  <rect x="40" y="300" width="1120" height="150" rx="14" fill="#0f1b30" stroke="#334155" stroke-width="1.5"/>
  <text x="64" y="332" class="h">FastAPI + LangGraph orchestration</text>
  <g>
    <rect x="70" y="352" width="240" height="78" rx="10" fill="#16223c"/>
    <text x="190" y="380" text-anchor="middle" class="lbl">IntakeAgent</text>
    <text x="190" y="402" text-anchor="middle" class="sub">regex normalize → Report</text>
    <text x="190" y="420" text-anchor="middle" class="sub">phone · UPI · account · authority</text>

    <rect x="330" y="352" width="240" height="78" rx="10" fill="#16223c"/>
    <text x="450" y="380" text-anchor="middle" class="lbl">ClassifierAgent</text>
    <text x="450" y="402" text-anchor="middle" class="sub">Ollama few-shot + rule layer</text>
    <text x="450" y="420" text-anchor="middle" class="sub">verdict · degrades to rules-only</text>

    <rect x="590" y="352" width="240" height="78" rx="10" fill="#16223c"/>
    <text x="710" y="380" text-anchor="middle" class="lbl">GraphLinkerAgent</text>
    <text x="710" y="402" text-anchor="middle" class="sub">MERGE nodes / edges</text>
    <text x="710" y="420" text-anchor="middle" class="sub">shared infra → rings form</text>

    <rect x="850" y="352" width="240" height="78" rx="10" fill="#241a2e"/>
    <text x="970" y="380" text-anchor="middle" class="lbl">PackageAgent</text>
    <text x="970" y="402" text-anchor="middle" class="sub">GDS + ReportLab PDF</text>
    <text x="970" y="420" text-anchor="middle" class="sub">on-demand</text>
  </g>
  <path d="M310 391 L330 391" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M570 391 L590 391" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M830 391 L850 391" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stores -->
  <rect x="300" y="520" width="280" height="120" rx="14" fill="#0f1b30" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="324" y="552" class="h">GraphStore (one interface)</text>
  <text x="324" y="580" class="lbl">▸ Neo4j + GDS &#160;<tspan class="sub">(primary)</tspan></text>
  <text x="324" y="604" class="lbl">▸ NetworkX &#160;<tspan class="sub">(auto-fallback)</tspan></text>
  <text x="324" y="628" class="sub">Louvain (rings) · PageRank (kingpin)</text>

  <rect x="640" y="520" width="260" height="120" rx="14" fill="#0f1b30" stroke="#334155" stroke-width="1.5"/>
  <text x="664" y="552" class="h">Synthetic data</text>
  <text x="664" y="580" class="lbl">~200 reports</text>
  <text x="664" y="604" class="lbl">3 planted rings + noise</text>
  <text x="664" y="628" class="sub">5 held back for live injection</text>

  <!-- Flow arrows -->
  <path d="M220 230 L220 300" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="232" y="270" fill="#22d3ee" font-size="13" font-weight="700">POST /report</text>

  <path d="M980 300 L980 230" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="992" y="270" fill="#ef4444" font-size="13" font-weight="700">GET /graph · /rings · /package</text>

  <path d="M440 450 L440 520" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M760 450 L760 520" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="40" y="710" class="sub">Resilience: Neo4j down → NetworkX fallback · Ollama down → deterministic rule layer · in-memory backend auto-seeds on startup.</text>
</svg>
